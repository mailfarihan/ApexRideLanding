services:
  - type: web
    name: apexride-landing
    env: static
    staticPublishPath: ./
    buildCommand: ""
    domains:
      - apexride.dev
      - www.apexride.dev
    routes:
      - type: rewrite
        source: /privacy
        destination: /privacy.html
      - type: rewrite
        source: /terms
        destination: /terms.html
      - type: redirect
        source: /ride
        destination: https://api.apexride.dev/ride
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /.well-known/assetlinks.json
        name: Content-Type
        value: application/json
