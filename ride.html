<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Ride Invite — ApexRide</title>
    <meta name="description" content="You've been invited to a group ride on ApexRide.">
    <meta property="og:title" content="Group Ride Invite — ApexRide">
    <meta property="og:description" content="You've been invited to a group ride. Open in the app to join!">
    <meta property="og:url" content="https://apexride.dev/ride">
    <meta property="og:image" content="images/screenshot-group-ride.jpeg">
    <link rel="icon" type="image/png" href="images/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #141418;
            --surface-hover: #1c1c22;
            --border: #28282f;
            --text: #f0f0f4;
            --text-muted: #8c8c9e;
            --accent: #f57c00;
            --accent-light: #ffb74d;
            --accent-dark: #e65100;
            --accent-glow: rgba(245, 124, 0, 0.2);
            --gradient: linear-gradient(135deg, #ff9800 0%, #f4511e 100%);
        }

        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Nav */
        nav {
            background: rgba(10, 10, 15, 0.88);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
        }
        .nav-inner {
            max-width: 680px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 800;
            font-size: 1.2rem;
            text-decoration: none;
            color: var(--text);
        }
        .logo img { width: 34px; height: 34px; border-radius: 8px; }
        .logo span { color: var(--accent-light); }

        /* Main */
        .container {
            max-width: 680px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
        }

        /* Loading / Error */
        .state-msg {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-muted);
            font-size: 1.1rem;
        }
        .state-msg .spinner {
            width: 32px; height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Card */
        .ride-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            display: none;
        }
        .ride-card.visible { display: block; }

        .ride-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .ride-status {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }
        .status-upcoming { background: rgba(76, 175, 80, 0.15); color: #66bb6a; }
        .status-ongoing { background: rgba(245, 124, 0, 0.15); color: var(--accent-light); }
        .status-completed { background: rgba(158, 158, 158, 0.15); color: #9e9e9e; }
        .status-cancelled { background: rgba(244, 67, 54, 0.15); color: #ef5350; }

        .ride-title {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 0.25rem;
        }
        .ride-creator {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .ride-creator img {
            width: 20px; height: 20px;
            border-radius: 50%;
            object-fit: cover;
        }

        .ride-body { padding: 1.5rem; }

        .ride-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }
        .meta-item {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }
        .meta-icon {
            width: 18px; height: 18px;
            color: var(--accent);
            flex-shrink: 0;
            margin-top: 2px;
        }
        .meta-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .meta-value {
            font-size: 0.95rem;
            font-weight: 500;
        }

        .ride-description {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 1.25rem;
            line-height: 1.7;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
        }
        .tag {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Members */
        .members-section {
            border-top: 1px solid var(--border);
            padding: 1.25rem 1.5rem;
        }
        .members-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }
        .members-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .member {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--surface-hover);
            padding: 0.35rem 0.7rem;
            border-radius: 20px;
            font-size: 0.85rem;
        }
        .member img {
            width: 24px; height: 24px;
            border-radius: 50%;
            object-fit: cover;
        }
        .member-placeholder {
            width: 24px; height: 24px;
            border-radius: 50%;
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* CTA */
        .cta-section {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }
        .cta-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.85rem 2rem;
            background: var(--gradient);
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            border-radius: 12px;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .cta-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }
        .cta-btn svg { width: 20px; height: 20px; }
        .cta-sub {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .cta-sub a { color: var(--accent-light); text-decoration: none; }
        .cta-sub a:hover { text-decoration: underline; }

        footer {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 500px) {
            .ride-meta { grid-template-columns: 1fr; }
            .ride-title { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-inner">
        <a href="/" class="logo">
            <img src="images/icon.png" alt="ApexRide">
            Apex<span>Ride</span>
        </a>
    </div>
</nav>

<div class="container">
    <div class="state-msg" id="loading">
        <div class="spinner"></div>
        Loading group ride...
    </div>
    <div class="state-msg" id="error" style="display:none;"></div>

    <div class="ride-card" id="ride-card">
        <div class="ride-header">
            <div class="ride-status" id="ride-status"></div>
            <h1 class="ride-title" id="ride-title"></h1>
            <div class="ride-creator" id="ride-creator"></div>
        </div>

        <div class="ride-body">
            <div class="ride-meta" id="ride-meta"></div>
            <p class="ride-description" id="ride-description"></p>
            <div class="tags" id="ride-tags"></div>
        </div>

        <div class="members-section">
            <div class="members-title" id="members-title">Riders</div>
            <div class="members-list" id="members-list"></div>
        </div>

        <div class="cta-section">
            <a class="cta-btn" id="open-app-btn" href="#">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                Open in ApexRide
            </a>
            <p class="cta-sub">
                Don't have the app? <a href="https://play.google.com/store/apps/details?id=com.apexride" target="_blank" rel="noopener">Get it on Google Play</a>
            </p>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 ApexRide. All rights reserved.
</footer>

<script>
(function() {
    var params = new URLSearchParams(window.location.search);
    var rideId = params.get('id');
    var loadingEl = document.getElementById('loading');
    var errorEl = document.getElementById('error');
    var cardEl = document.getElementById('ride-card');

    if (!rideId) {
        loadingEl.style.display = 'none';
        errorEl.style.display = 'block';
        errorEl.textContent = 'No group ride ID provided.';
        return;
    }

    // Set up the deep link
    var deepLink = 'apexride://group-ride/' + encodeURIComponent(rideId);
    var appBtn = document.getElementById('open-app-btn');
    appBtn.href = deepLink;

    // Try to open the app immediately on mobile
    if (/android/i.test(navigator.userAgent)) {
        var iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = deepLink;
        document.body.appendChild(iframe);
        setTimeout(function() { document.body.removeChild(iframe); }, 2000);
    }

    // Fetch ride details from public API
    fetch('https://api.apexride.dev/api/trips/' + encodeURIComponent(rideId) + '/invite')
        .then(function(r) {
            if (!r.ok) throw new Error(r.status === 404 ? 'Group ride not found.' : 'Failed to load.');
            return r.json();
        })
        .then(function(ride) {
            loadingEl.style.display = 'none';
            cardEl.classList.add('visible');

            // Update OG meta
            document.title = ride.title + ' — ApexRide Group Ride';

            // Status badge
            var statusEl = document.getElementById('ride-status');
            statusEl.textContent = ride.status;
            statusEl.className = 'ride-status status-' + ride.status;

            // Title
            document.getElementById('ride-title').textContent = ride.title;

            // Creator
            var creatorHtml = '';
            if (ride.creatorPhotoUrl) {
                creatorHtml += '<img src="' + escapeHtml(ride.creatorPhotoUrl) + '" alt="">';
            }
            creatorHtml += 'Organized by <strong>' + escapeHtml(ride.creatorName || 'Rider') + '</strong>';
            document.getElementById('ride-creator').innerHTML = creatorHtml;

            // Meta grid
            var metaHtml = '';
            // Date
            var d = new Date(ride.dateTime);
            metaHtml += metaItem(calendarSvg, 'When', formatDate(d));
            // Location
            if (ride.startAddress) {
                metaHtml += metaItem(pinSvg, 'Start', escapeHtml(ride.startAddress));
            }
            // Riders
            var ridersText = ride.attendeeCount + ' rider' + (ride.attendeeCount !== 1 ? 's' : '');
            if (ride.maxRiders > 0) ridersText += ' / ' + ride.maxRiders + ' max';
            metaHtml += metaItem(peopleSvg, 'Riders', ridersText);
            // Distance
            if (ride.estimatedDistance > 0) {
                metaHtml += metaItem(routeSvg, 'Distance', ride.estimatedDistance.toFixed(1) + ' km');
            }
            // Difficulty
            if (ride.difficulty) {
                metaHtml += metaItem(signalSvg, 'Difficulty', capitalize(ride.difficulty));
            }
            document.getElementById('ride-meta').innerHTML = metaHtml;

            // Description
            var descEl = document.getElementById('ride-description');
            if (ride.description) {
                descEl.textContent = ride.description;
            } else {
                descEl.style.display = 'none';
            }

            // Tags
            var tagsEl = document.getElementById('ride-tags');
            if (ride.ridingStyles && ride.ridingStyles.length) {
                tagsEl.innerHTML = ride.ridingStyles.map(function(s) {
                    return '<span class="tag">' + escapeHtml(capitalize(s)) + '</span>';
                }).join('');
            } else {
                tagsEl.style.display = 'none';
            }

            // Members
            var membersTitle = document.getElementById('members-title');
            membersTitle.textContent = 'Riders (' + ride.attendeeCount + ')';
            var membersHtml = '';
            (ride.participants || []).forEach(function(p) {
                membersHtml += '<div class="member">';
                if (p.photoUrl) {
                    membersHtml += '<img src="' + escapeHtml(p.photoUrl) + '" alt="">';
                } else {
                    membersHtml += '<div class="member-placeholder">' + escapeHtml(p.displayName.charAt(0).toUpperCase()) + '</div>';
                }
                membersHtml += escapeHtml(p.displayName);
                membersHtml += '</div>';
            });
            document.getElementById('members-list').innerHTML = membersHtml;
        })
        .catch(function(err) {
            loadingEl.style.display = 'none';
            errorEl.style.display = 'block';
            errorEl.textContent = err.message || 'Something went wrong.';
        });

    // Helpers
    function escapeHtml(s) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(s || ''));
        return div.innerHTML;
    }
    function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }
    function formatDate(d) {
        var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var h = d.getHours(), m = d.getMinutes();
        var ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return days[d.getDay()] + ', ' + months[d.getMonth()] + ' ' + d.getDate() + ' at ' +
               h + ':' + (m < 10 ? '0' : '') + m + ' ' + ampm;
    }
    function metaItem(icon, label, value) {
        return '<div class="meta-item">' + icon +
               '<div><div class="meta-label">' + label + '</div>' +
               '<div class="meta-value">' + value + '</div></div></div>';
    }

    var calendarSvg = '<svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
    var pinSvg = '<svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>';
    var peopleSvg = '<svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>';
    var routeSvg = '<svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="3"/><line x1="12" y1="8" x2="12" y2="16"/><circle cx="12" cy="19" r="3"/></svg>';
    var signalSvg = '<svg class="meta-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="20" x2="6" y2="14"/><line x1="12" y1="20" x2="12" y2="8"/><line x1="18" y1="20" x2="18" y2="4"/></svg>';
})();
</script>

</body>
</html>
